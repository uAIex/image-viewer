<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Viewer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff1f1;
      color: #000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: #fff;
      color: #000;
    }

    main {
      width: min(1100px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 32px 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 18px;
      border-bottom: 2px solid #000;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 6vw, 72px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .hint {
      max-width: 360px;
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
      text-align: right;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid #000;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    .file-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 13px;
      border: 1px solid #000;
      border-radius: 6px;
      background: #fff;
      color: #000;
      font: inherit;
      cursor: pointer;
      user-select: none;
    }

    button:hover,
    button:focus-visible,
    .file-button:hover,
    .file-button:focus-within {
      background: #000;
      color: #fff;
      outline: none;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    .status {
      min-width: 180px;
      text-align: right;
      font-size: 15px;
      line-height: 1.35;
    }

    .viewer {
      min-height: 520px;
      border: 1px solid #000;
      border-radius: 8px;
      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    .viewer img {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 240px);
      width: auto;
      height: auto;
      object-fit: contain;
    }

    body.is-viewing {
      background: #fff;
      overflow: hidden;
    }

    body.is-viewing main {
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      padding: 0;
      display: block;
    }

    body.is-viewing header,
    body.is-viewing .controls,
    body.is-viewing .filename {
      display: none;
    }

    body.is-viewing .viewer {
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      border: 0;
      border-radius: 0;
      background: #fff;
      overflow: hidden;
    }

    body.is-viewing .viewer img {
      width: 100vw;
      height: 100vh;
      max-width: none;
      max-height: none;
      object-fit: contain;
    }

    .empty {
      max-width: 460px;
      padding: 28px;
      text-align: center;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 700;
    }

    .filename {
      padding: 12px 0;
      border-top: 1px solid #000;
      font: 15px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow-wrap: anywhere;
    }

    @media (max-width: 760px) {
      main {
        padding: 24px 0;
      }

      header,
      .controls {
        display: block;
      }

      .hint,
      .status {
        max-width: none;
        margin-top: 14px;
        text-align: left;
      }

      .viewer {
        min-height: 360px;
      }

      .viewer img {
        max-height: calc(100vh - 300px);
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Image viewer.</h1>
      <p class="hint">Choose image files or a folder. Use Up/Down arrows to move through the list.</p>
    </header>

    <section class="controls" aria-label="Image controls">
      <div class="buttons">
        <label class="file-button">
          Open images
          <input id="fileInput" type="file" accept="image/*" multiple>
        </label>
        <label class="file-button">
          Open folder
          <input id="folderInput" type="file" accept="image/*" webkitdirectory directory multiple>
        </label>
        <button id="previous" type="button">Previous</button>
        <button id="next" type="button">Next</button>
      </div>
      <div id="status" class="status" role="status" aria-live="polite">No images loaded.</div>
    </section>

    <section id="viewer" class="viewer" aria-label="Image preview">
      <div class="empty">Pick images, then press Up or Down to browse.</div>
    </section>

    <div id="filename" class="filename">No file selected.</div>
  </main>

  <script>
    const fileInput = document.querySelector("#fileInput");
    const folderInput = document.querySelector("#folderInput");
    const previousButton = document.querySelector("#previous");
    const nextButton = document.querySelector("#next");
    const viewer = document.querySelector("#viewer");
    const status = document.querySelector("#status");
    const filename = document.querySelector("#filename");

    let images = [];
    let currentIndex = 0;
    let currentUrl = "";

    function imageName(file) {
      return file.webkitRelativePath || file.name;
    }

    function revokeCurrentUrl() {
      if (currentUrl) {
        URL.revokeObjectURL(currentUrl);
        currentUrl = "";
      }
    }

    function setStatus(message) {
      status.textContent = message;
    }

    function showImage(index) {
      if (images.length === 0) {
        revokeCurrentUrl();
        viewer.innerHTML = '<div class="empty">Pick images, then press Up or Down to browse.</div>';
        filename.textContent = "No file selected.";
        setStatus("No images loaded.");
        return;
      }

      currentIndex = (index + images.length) % images.length;
      const file = images[currentIndex];
      revokeCurrentUrl();
      currentUrl = URL.createObjectURL(file);

      viewer.innerHTML = "";
      const img = document.createElement("img");
      img.src = currentUrl;
      img.alt = imageName(file);
      viewer.appendChild(img);

      document.body.classList.add("is-viewing");
      filename.textContent = imageName(file);
      setStatus((currentIndex + 1) + " of " + images.length);
    }

    function loadFiles(fileList) {
      images = Array.from(fileList)
        .filter((file) => file.type.startsWith("image/"))
        .sort((a, b) => imageName(a).localeCompare(imageName(b), undefined, {
          numeric: true,
          sensitivity: "base"
        }));

      currentIndex = 0;
      showImage(0);
    }

    function nextImage() {
      showImage(currentIndex + 1);
    }

    function previousImage() {
      showImage(currentIndex - 1);
    }

    fileInput.addEventListener("change", () => {
      loadFiles(fileInput.files);
    });

    folderInput.addEventListener("change", () => {
      loadFiles(folderInput.files);
    });

    nextButton.addEventListener("click", nextImage);
    previousButton.addEventListener("click", previousImage);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowDown") {
        event.preventDefault();
        nextImage();
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();
        previousImage();
      }

      if (event.key.toLowerCase() === "o") {
        event.preventDefault();
        fileInput.click();
      }
    });

    window.addEventListener("pagehide", revokeCurrentUrl);
  </script>
</body>
</html>
