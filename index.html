<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Viewer</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #fff;
      overflow: auto;
    }

    body {
      display: block;
    }

    input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    .empty {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #111;
      font: 18px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      user-select: none;
    }

    main {
      width: auto;
      height: auto;
      margin: 0;
      padding: 0;
    }

    img {
      display: block;
      width: auto;
      height: auto;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <input id="folderInput" type="file" accept="image/*" webkitdirectory directory multiple>
  <main id="viewer">
    <p class="empty">Click to open folder</p>
  </main>

  <script>
    const folderInput = document.getElementById("folderInput");
    const viewer = document.getElementById("viewer");

    let images = [];
    let urls = [];
    let currentIndex = 0;

    function imageName(file) {
      return file.webkitRelativePath || file.name;
    }

    function revokeUrls() {
      for (const url of urls) {
        URL.revokeObjectURL(url);
      }
      urls = [];
    }

    function showEmpty() {
      viewer.replaceChildren();
      const empty = document.createElement("p");
      empty.className = "empty";
      empty.textContent = "Click to open folder";
      viewer.appendChild(empty);
    }

    function showImage(index) {
      if (!images.length) {
        showEmpty();
        return;
      }

      currentIndex = (index + images.length) % images.length;
      const image = document.createElement("img");
      image.src = urls[currentIndex];
      image.alt = imageName(images[currentIndex]);
      image.title = imageName(images[currentIndex]);
      viewer.replaceChildren(image);
    }

    function loadFiles(fileList) {
      revokeUrls();

      images = Array.from(fileList)
        .filter(file => file.type.startsWith("image/"))
        .sort((a, b) => imageName(a).localeCompare(imageName(b), undefined, {
          numeric: true,
          sensitivity: "base"
        }));

      urls = images.map(file => URL.createObjectURL(file));
      showImage(0);
    }

    function openFolder() {
      folderInput.click();
    }

    folderInput.addEventListener("change", () => {
      loadFiles(folderInput.files);
    });

    document.addEventListener("click", () => {
      if (!images.length) {
        openFolder();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "ArrowRight" || event.key === "ArrowDown") {
        event.preventDefault();
        showImage(currentIndex + 1);
      }

      if (event.key === "ArrowLeft" || event.key === "ArrowUp") {
        event.preventDefault();
        showImage(currentIndex - 1);
      }

      if (event.key.toLowerCase() === "o") {
        event.preventDefault();
        openFolder();
      }
    });

    window.addEventListener("pagehide", revokeUrls);
  </script>
</body>
</html>
